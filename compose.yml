services:
  db:
    image: postgres:18
    container_name: tagly-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=taglydb
      - POSTGRES_USER=tagly
      - POSTGRES_PASSWORD=tagly
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagly"]
      interval: 10s

  redis:
    image: redis:7
    container_name: tagly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: . 
      dockerfile: auth/Dockerfile
    container_name: tagly-auth
    ports:
      - "8000:8000"
    volumes:
      - ./auth:/auth
    depends_on:
      db-service:
        condition: service_healthy

  db-service:
    build: ./DBService
    container_name: tagly-db-service
    ports:
      - "8001:8001"
    volumes:
      - ./DBService:/db-service
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: